<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Runes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html">HOME</a>
    <a href="guide.html">GUIDE</a>
    <a href="runes.html">RUNES</a>
    <a href="calculator.html">CALCULATOR</a>
</header>

<section class="hero">
    <h1>Runes</h1>
    <p>Click a rune to view all its stats</p>
</section>

<section class="content rune-grid">

    <!-- LUCK -->
    <div class="rune-card" onclick="openRune('luck')">
        <h2>Luck Rune</h2>
        <img src="images/runes/luck.png">
        <p>+40 Luck</p>
    </div>

    <!-- SPEED -->
    <div class="rune-card" onclick="openRune('speed')">
        <h2>Speed Rune</h2>
        <img src="images/runes/speed.png">
        <p>+25.6 Speed</p>
    </div>

    <!-- BULK -->
    <div class="rune-card" onclick="openRune('bulk')">
        <h2>Bulk Rune</h2>
        <img src="images/runes/bulk.png">
        <p>+65 Bulk</p>
    </div>

</section>

<!-- POPUP -->
<div id="popup" class="popup">
    <div class="popup-content">
        <span class="close" onclick="closePopup()">&times;</span>
        <div id="popup-images"></div>
    </div>
</div>

<script>
function openRune(rune) {
    const popup = document.getElementById("popup");
    const container = document.getElementById("popup-images");

    container.innerHTML = "";

    // Change number of images per rune here
    for (let i = 1; i <= 5; i++) {
        let img = document.createElement("img");
        img.src = `images/rune-details/${rune}/${i}.png`;
        img.className = "popup-img";
        container.appendChild(img);
    }

    popup.style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
